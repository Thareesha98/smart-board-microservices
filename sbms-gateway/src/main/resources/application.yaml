spring:
  application:
    name: sbms-gateway

  main:
    allow-bean-definition-overriding: true

  redis:
    host: sbms-redis
    port: 6379
    timeout: 2000ms

  cloud:
    gateway:
      redis-rate-limiter:
        enabled: true

server:
  port: 8080

cors:
  allowed-origins: "*"
  allowed-methods: "GET,POST,PUT,DELETE,OPTIONS"
  allowed-headers: "Authorization,Content-Type,Accept"
  allow-credentials: true

sbms:
  jwt:
    secret: ${SBMS_JWT_SECRET:}
    algorithm: HS256
    header: Authorization
    prefix: Bearer

management:
  endpoints:
    web:
      exposure:
        include: "*"